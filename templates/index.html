<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Agent Chat</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="chat-container">

    <!-- Sidebar Container (mini + main sidebar) -->
    <div class="sidebar-container">
      
      <!-- Mini Sidebar -->
      <div class="mini-sidebar">
        <button class="mini-icon" title="Settings">⚙️</button>
        <button class="mini-icon" title="About">ℹ️</button>
        <button class="mini-icon toggle-btn" title="Collapse">⬅️</button>
        <button class="mini-icon" title="Filter">🔍</button>
      </div>
      
      <div class="filter-sidebar" id="filter-sidebar" style="display: none;">
        <div class="filter-header">
          <h3>Filter Documents</h3>
          <button id="close-filter">✖️</button>
        </div>

        <div class="filter-content">
          <!-- gets populated dynamically through JS -->
        </div>
      </div>

      <!-- Main Sidebar -->
      <div class="sidebar">
        <img src="{{ url_for('static', filename='Images/PitPixie-logo.png') }}" class="sidebar-logo" alt="PitPixie Logo">
        <button class="new-chat-btn">+ New Chat</button>

        <h3>Chat History</h3>
        <div class="chat-history"></div>
      </div>
    </div>

    <!-- Chat Window -->
    <div class="chat-window">
      <div class="chat-header">
        <button class="export-btn">Export</button>
      </div>
      
      <!-- Welcome screen (shown initially) -->
      <div class="welcome-screen">
        <h1>What are we mining today?</h1>
        <form class="welcome-input" id="upload-form" method="POST" enctype="multipart/form-data">
          <label for="welcome-file" class="upload-btn">+</label>
          <input type="file" id="welcome-file" name="doc_file" style="display: none;" />
          <textarea class="welcome-message-input" name="message" placeholder="Ask anything..."></textarea>
          <button type="submit" class="welcome-send-btn">Send</button>
        </form>
      </div>

      <!-- Empty chat area -->
      <div class="chat-messages" style="display:none;"></div>

      <div class="chat-input" style="display:none;">
        <label for="file-upload" class="upload-btn">+</label>
        <input type="file" id="file-upload" name="doc_file" style="display: none;" />
        <textarea class="message-input" placeholder="Type your message..."></textarea>
        <button class="send-btn" type="submit">Send</button>
      </div>
    </div>
    
    <!--Settings Window-->
    <div class="settings-window" id="settings-window" style="display: none;">
      <div class="settings-header">
        <h2>Settings</h2>
        <button id="back-to-chat">⬅ Back</button>
      </div>

      <div class="settings-content">
        <label>
          Export Format:
          <select id="config-export">
            <option value="csv" selected>CSV</option>
            <option value="txt">TXT</option>
            <option value="json">JSON</option>
          </select>
        </label>

        <label for="config-theme">
          Theme:
            <div id="config-theme" class="theme-toggle">
              <button class="theme-option" data-theme="light" title="Light Mode">
                🌞
              </button>
              <button class="theme-option" data-theme="dark" title="Dark Mode">
                🌜
              </button>
            </div>
        </label>
      </div>
    </div>

    <!-- About Window -->
    <div class="about-window" id="about-window" style="display: none;">
      <div class="about-header">
        <h2>About PitPixie</h2>
          <button id="back-to-chat-from-about">⬅ Back</button>
      </div>

      <iframe src="/about" class="about-iframe" style="width: 100%; height: 100%; border: none;"></iframe>

    </div>
  </div>
  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
